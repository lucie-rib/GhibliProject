<section class="movies-section">
  <div class="row">
    @for (movie of selectedMovies(); track movie.id) {
        <div class="col d-flex justify-content-center">
            <app-movie-display [movie]="movie" (movieClicked)="onMovieClicked($event)"></app-movie-display>
        </div>
    }
  </div>
</section>
