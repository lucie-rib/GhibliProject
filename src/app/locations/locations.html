<section class="body-section">
<h2 class="text-center mb-4 titre">All Locations in the Studio Ghibli Collection</h2>
<app-letter-selector (emitted_letter)="onLetterSelected($event)"></app-letter-selector>

  <div class="d-flex flex-column align-items-center mb-5">
    <form (ngSubmit)="submit()" [formGroup]="searchGroup" class="w-100 mb-3" style="max-width: 600px;">
      <div class="input-group shadow-sm rounded-pill overflow-hidden border">
        <input 
          class="form-control border-0 py-3 px-4 bg-white text-dark" 
          [formControl]="searchControl" 
          placeholder="Research a film..."
        >
        <button 
          type="button" 
          class="clear-btn" 
          (click)="reset()"
          [disabled]="!searchControl.value.trim()"
          aria-label="Clear search">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M5 5 L15 15 M15 5 L5 15"></path>
          </svg>
        </button>
        <button 
          class="btn btn-dark px-4 fw-bold" 
          type="submit" 
          [disabled]="searchGroup.invalid">
          Search
        </button>
      </div>
    </form>
  </div>
  
  <div class="content-wrapper">
    <app-locations-list [selected_letter]="selectedLetter" [locations]="filteredLocations"></app-locations-list>
  </div>
</section>
