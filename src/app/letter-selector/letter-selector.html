<div class="column">

  <!-- Main alphabet controls. -->
  @for (letter of letter_array; track letter) {
    <button
      (click)="letter_click(letter)"
      [class.active]="current_letter === letter"
    >
      {{ letter }}
    </button>
  }


  <!-- Shortcut button to remove alphabetical filtering. -->
  <span class="sep">-</span>
  <button (click)="letter_click('All')" [class.active]="false">All</button>
  
</div>
