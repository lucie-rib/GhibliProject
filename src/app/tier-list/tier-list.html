<section class="tier-list-page">
  <h2 class="text-center mb-4 titre">Studio Ghibli Tier List</h2>
  <h3 class="text-center mb-4 subtitle">Drag and drop the films into the tier you think they belong to !</h3>
  <div class="tier-board">
    <div class="tier-row tier-s">
      <div class="tier-label">S</div>
      <div class="tier-dropzone"></div>
    </div>

    <div class="tier-row tier-a">
      <div class="tier-label">A</div>
      <div class="tier-dropzone"></div>
    </div>

    <div class="tier-row tier-b">
      <div class="tier-label">B</div>
      <div class="tier-dropzone"></div>
    </div>

    <div class="tier-row tier-c">
      <div class="tier-label">C</div>
      <div class="tier-dropzone"></div>
    </div>

    <div class="tier-row tier-d">
      <div class="tier-label">D</div>
      <div class="tier-dropzone"></div>
    </div>
  </div>
</section>

<app-carousel-card [movies]="movies"></app-carousel-card>
