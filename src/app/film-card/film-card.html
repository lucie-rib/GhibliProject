<div class="film_card">
    <div class="film_card_image" (click)="openDescription()">
        <img [src]="film_image" [alt]="film_title">
    </div>
    <div class="film_card_text">
        <p>{{film_title}}</p>
    </div>
</div>

@if (isDescriptionOpen) {
  <div class="overlay" (click)="closeDescription()">
    <article class="film-modal" (click)="$event.stopPropagation()">
      <div class="film-modal__media">
        <img [src]="film_image" [alt]="film_title" />
        <button
          type="button"
          class="film-modal__close"
          (click)="closeDescription()"
          aria-label="Fermer la description"
        >
          X
        </button>
      </div>

      <div class="film-modal__body">
        <h3>{{ film_title }}</h3>
        <h3>{{ film_title_jp }}</h3>
        <p><strong>Director:</strong> {{ film_director }}</p>
        <p><strong>Release Date:</strong> {{ film_release_date }}</p>
        <p><strong>Rating:</strong> {{ film_rate }} / 100</p>
        <p>{{ film_description }}</p>
      </div>
    </article>
  </div>
}
