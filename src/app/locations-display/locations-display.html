<div class="movie-item">
  <div class="movie-content">
    <!-- Reuse the generic card component with location-specific inputs. -->
    <app-film-card
      [film_image]="locationImageUrl"
      [location_name]="sanitizeLocationField(location.name)"
      [location_climate]="sanitizeLocationField(location.climate)"
      [location_terrain]="sanitizeLocationField(location.terrain)"
      [location_surface_water]="sanitizeLocationField(location.surface_water)"
      [location_residents_count]="'' + (location.residents?.length ?? 0)"
      [location_films_count]="'' + (location.films?.length ?? 0)"
    ></app-film-card>
  </div>
</div>
