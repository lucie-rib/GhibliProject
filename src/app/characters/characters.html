<section class="body-section">
  <h2 class="text-center mb-4 titre">All characters in the Studio Ghibli Collection</h2>
  <app-letter-selector (emitted_letter)="onLetterSelected($event)"></app-letter-selector>
  <br>
  <!-- Search form that allows users to filter characters by name. 
   It includes an input field for the search term, a clear button 
   to reset the search, and a submit button to apply the search filter. -->
  <form (ngSubmit)="submit()" [formGroup]="searchGroup" class="search-form">
      <div class="input-group shadow-sm rounded-pill overflow-hidden border">
        <input 
          class="form-control border-0 py-2 px-4 bg-white text-dark search-field" 
          [formControl]="searchControl" 
          placeholder="Research a Character..."
        >
        <button
          type="button"
          class="clear-btn"
          (click)="reset()"
          [disabled]="!searchControl.value.trim()"
          aria-label="Clear search">
          <svg viewBox="0 0 20 20" aria-hidden="true">
            <path d="M5 5 L15 15 M15 5 L5 15"></path>
          </svg>
        </button>
        <button 
          class="btn btn-dark px-4 fw-bold search-submit" 
          type="submit" 
          [disabled]="searchGroup.invalid">
          Search
        </button>
      </div>
    </form>
<div class="content-wrapper">
  <!-- Component that displays the list of character cards. 
   It receives the filtered list of characters, the loading state, 
   and whether there are more characters to load as inputs, a
   nd emits an event when the user clicks the "Load More" button. -->
<app-characters-list 
  [characters]="filteredCharacters"
  [isLoading]="isLoading"
  [hasMoreCharacters]="hasMoreCharacters"
  (loadMore)="loadMore()">
</app-characters-list>
<!-- If there are no more characters to load and 
 the component is not currently loading, display a message 
 indicating the end of the list and the total number of characters available. -->
@if (!hasMoreCharacters && !isLoading) {
  <div class="text-center text-muted my-4 fw-bold">
    <p>End of the list ! You have {{ allRawCharacters.length }} characters available.</p>
  </div>
}
</div>
</section>
