<form (ngSubmit)="submit()" [formGroup]="searchGroup" class="w-100 mb-3" style="max-width: 600px;">
  <div class="input-group shadow-sm rounded-pill overflow-hidden border">
    <input 
      class="form-control border-0 py-3 px-4 bg-white text-dark" 
      [formControl]="searchControl" 
      placeholder="Research a Character..."
    >
    <button 
      class="btn btn-dark px-4 fw-bold" 
      type="submit" 
      [disabled]="searchGroup.invalid">
      Search
    </button>
  </div>
</form>

<button 
  type="button" 
  class="btn btn-sm btn-outline-secondary rounded-pill px-4 mb-4" 
  (click)="reset()">
  Show all characters
</button>

<app-characters-list 
  [characters]="filteredCharacters"
  [isLoading]="isLoading"
  (loadMore)="loadMore()">
</app-characters-list>

@if (!hasMoreCharacters && !isLoading) {
  <div class="text-center text-muted my-4 fw-bold">
    <p>End of the List! You have Watched all the {{ allRawCharacters.length }} characters available.</p>
  </div>
}
